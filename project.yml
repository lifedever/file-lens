name: FileLens
options:
  bundleIdPrefix: com.lifedever
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  usesTabs: false
  indentWidth: 4
  tabWidth: 4
  createIntermediateGroups: true
packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.2.0
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "5"
    PRODUCT_NAME: $(TARGET_NAME)
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  FileLens:
    type: application
    platform: macOS
    sources:
      - path: FileLens
    dependencies:
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lifedever.FileLens
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: FileLens
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 lifedever"
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_CFBundleLocalizations: ["en", "zh-Hans"]
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: FileLens.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  FileLensTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: FileLensTests
    dependencies:
      - target: FileLens
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lifedever.FileLensTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/FileLens.app/Contents/MacOS/FileLens
schemes:
  FileLens:
    build:
      targets:
        FileLens: all
        FileLensTests: [test]
    test:
      config: Debug
      targets:
        - FileLensTests
    run:
      config: Debug
    archive:
      config: Release
